name: Build
on:
  - workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest 7-Zip version automatically (fixed timeout)
        shell: pwsh
        run: |
          # 加超时+重试，解决GitHub Actions网络问题
          $maxRetry = 3
          $retryCount = 0
          do {
              try {
                  $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html' -UseBasicParsing -TimeoutSec 30
                  break
              } catch {
                  $retryCount++
                  Write-Warning "请求超时，重试第 $retryCount 次..."
                  Start-Sleep -Seconds 5
              }
          } while ($retryCount -lt $maxRetry)

          if (-not $7zHtml) {
              throw "多次重试后仍无法连接7-Zip官网，构建终止"
          }

          $pattern = 'Download 7-Zip ([0-9]+\.[0-9]+)'
          $match = [regex]::Match($7zHtml.Content, $pattern)
          $displayVer = $match.Groups[1].Value
          $numVer = $displayVer.Replace('.', '')
          "7z$numVer" | Out-File -FilePath 7zVer.txt -Encoding utf8
          $displayVer | Out-File -FilePath 7zDisplayVer.txt -Encoding utf8
          Write-Output "✅ Latest 7-Zip: $displayVer (7z$numVer)"

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      - name: Upload artifact (NO compression)
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer
          path: ./*.exe
          if-no-files-found: error
          compression: none

      - name: Prepare version for Release
        shell: pwsh
        run: |
          $ver = Get-Content 7zDisplayVer.txt
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: 7-Zip ${{ env.VERSION }} Custom Icon
          tag_name: v${{ env.VERSION }}-custom
          files: ./*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
