name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \(\d{4}-\d{2}-\d{2}\)'
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "The latest version of 7-Zip is $buildVersion."
          echo "BUILD_VERSION=$buildVersion" >> $env:GITHUB_ENV

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      - name: Locate installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path . -Recurse -Filter "*.exe" | Select-Object -First 1
          if ($installer) {
            $installerPath = $installer.FullName
            Write-Host "✅ 找到安装包：$installerPath"
            echo "INSTALLER_PATH=$installerPath" >> $env:GITHUB_ENV
            echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_ENV
          } else {
            Write-Error "❌ 未找到任何 .exe 安装包"
            exit 1
          }

      # 新增：检查并删除已存在的 Release 和标签
      - name: Delete existing release and tag
        shell: pwsh
        run: |
          $tagName = "${{ env.BUILD_VERSION }}"
          # 检查标签是否存在
          $tagExists = git ls-remote --tags origin "refs/tags/$tagName"
          if ($tagExists) {
            Write-Host "⚠️ 标签 $tagName 已存在，正在删除旧 Release 和标签..."
            # 删除旧 Release
            $release = gh release view $tagName --json id -q '.id'
            if ($release) {
              gh release delete $release --yes
              Write-Host "✅ 已删除旧 Release"
            }
            # 删除本地和远程标签
            git tag -d $tagName
            git push origin :refs/tags/$tagName
            Write-Host "✅ 已删除标签 $tagName"
          } else {
            Write-Host "✅ 标签 $tagName 不存在，可以正常创建"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          release_name: 7-Zip ${{ env.BUILD_VERSION }} (Custom Icon)
          draft: false
          prerelease: false

      - name: Upload Installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.INSTALLER_PATH }}
          asset_name: 7z-${{ env.BUILD_VERSION }}-Custom-Icon.exe
          asset_content_type: application/x-msdownload
