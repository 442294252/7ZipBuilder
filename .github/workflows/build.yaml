name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \(\d{4}-\d{2}-\d{2}\)'
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "The latest version of 7-Zip is $buildVersion."
          echo "BUILD_VERSION=$buildVersion" >> $env:GITHUB_ENV
          echo "INSTALLER_PATH=$workDir\$buildVersion.exe" >> $env:GITHUB_ENV

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      # 清理旧标签/Release（避免already_exists）
      - name: Delete existing release and tag
        shell: pwsh
        run: |
          $tagName = "${{ env.BUILD_VERSION }}"
          $tagExists = git ls-remote --tags origin "refs/tags/$tagName"
          if ($tagExists) {
            Write-Host "⚠️ 标签 $tagName 已存在，清理旧版本..."
            # 删除旧Release
            gh release delete $tagName --yes 2>$null
            # 删除标签
            git tag -d $tagName 2>$null
            git push origin :refs/tags/$tagName 2>$null
            Write-Host "✅ 已清理旧标签/Release"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          release_name: 7-Zip ${{ env.BUILD_VERSION }} (Custom Icon)
          draft: false
          prerelease: false

      # 直接使用Pack.ps1的输出路径上传（根目录下的$BuildVersion.exe）
      - name: Upload Installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.BUILD_VERSION }}.exe  # 精准指向Pack.ps1生成的文件
          asset_name: 7z-${{ env.BUILD_VERSION }}-Custom-Icon.exe
          asset_content_type: application/x-msdownload
