name: Build
on:
  - workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Set fixed version 26.00 (NO NETWORK REQUEST)
        shell: pwsh
        run: |
          $displayVer = "26.00"
          $numVer = "2600"
          "7z$numVer" | Out-File -FilePath 7zVer.txt -Encoding utf8
          $displayVer | Out-File -FilePath 7zDisplayVer.txt -Encoding utf8
          Write-Output "✅ Fixed version: 7-Zip $displayVer (7z$numVer)"

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      - name: Upload artifact (NO compression)
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer
          path: ./*.exe
          if-no-files-found: error
          compression: none

      - name: Prepare version for Release
        shell: pwsh
        run: |
          $ver = Get-Content 7zDisplayVer.txt
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create Release & Upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: 7-Zip ${{ env.VERSION }} Custom Icon
          tag_name: v${{ env.VERSION }}-custom
          files: ./*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
