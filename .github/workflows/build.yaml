name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \(\d{4}-\d{2}-\d{2}\)'
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "✅ The latest version of 7-Zip is $buildVersion"

      - name: Prepare (彻底绕过参数传递)
        shell: pwsh
        run: |
          # 关键：不传递任何参数，让Prepare.ps1自己去读7zVer.txt
          .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: |
          $buildVersion = (Get-Content -Path 7zVer.txt -Raw).Trim()
          .\Build.ps1 $buildVersion

      - name: Pack
        shell: pwsh
        run: |
          $buildVersion = (Get-Content -Path 7zVer.txt -Raw).Trim()
          .\Package.ps1 $buildVersion

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer
          path: ./*.exe
          if-no-files-found: error
