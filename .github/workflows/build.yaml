name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \('
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "✅ 7-Zip目标版本：$buildVersion"

      - name: Prepare (适配原生脚本，修复参数传递)
        shell: pwsh
        run: |
          $buildVersion = Get-Content -Path 7zVer.txt -Raw
          # 关键：使用双引号包裹变量，强制PowerShell在调用前展开变量值
          .\Prepare.ps1 "$buildVersion"

      - name: Build (适配原生脚本)
        shell: pwsh
        run: |
          $buildVersion = Get-Content -Path 7zVer.txt -Raw
          .\Build.ps1 "$buildVersion"

      - name: Pack (适配原生脚本)
        shell: pwsh
        run: |
          $buildVersion = Get-Content -Path 7zVer.txt -Raw
          .\Package.ps1 "$buildVersion"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer
          path: ./*.exe
          if-no-files-found: error
