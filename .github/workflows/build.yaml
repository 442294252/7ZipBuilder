name: Build
on:
  - workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $match = $7zHtml.Content | Select-String -Pattern 'Download 7-Zip ([\d.]+)'
          $ver = $match.Matches.Groups[1].Value
          $verFile = "7z$($ver.Replace('.',''))"
          Set-Content 7zVer.txt -Value $verFile
          echo "VERSION=$verFile" >> $env:GITHUB_ENV
          echo "VERSION_TAG=$ver" >> $env:GITHUB_ENV

      - name: Prepare
        shell: pwsh
        run: Get-Content 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content 7zVer.txt | .\Pack.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip
          path: ./*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 7-Zip ${{ env.VERSION_TAG }}
          tag_name: ${{ env.VERSION_TAG }}
          files: ./*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
