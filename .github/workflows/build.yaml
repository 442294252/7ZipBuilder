name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \(\d{4}-\d{2}-\d{2}\)'
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "The latest version of 7-Zip is $buildVersion."
          # 新增：将版本号存入环境变量，供后续发布步骤使用
          echo "BUILD_VERSION=$buildVersion" >> $env:GITHUB_ENV

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer
          path: ./*.exe
          if-no-files-found: error

      # ========== 新增：自动创建Release并上传安装包 ==========
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub内置令牌，无需手动配置
        with:
          tag_name: ${{ env.BUILD_VERSION }}  # 标签名与7-Zip版本一致（如7z2600）
          release_name: 7-Zip ${{ env.BUILD_VERSION }} (Custom Icon)  # Release名称
          draft: false  # 直接发布，不设为草稿
          prerelease: false  # 非预发布版本

      - name: Upload Installer to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}  # 关联上面创建的Release
          asset_path: ./*.exe  # 编译好的安装包路径
          asset_name: 7z-${{ env.BUILD_VERSION }}-Custom-Icon.exe  # 上传后的文件名（易识别）
          asset_content_type: application/x-msdownload  # Windows EXE文件标准类型
