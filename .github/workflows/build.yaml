name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      # ========== 核心优化1：缓存编译产物（大幅缩短Build耗时） ==========
      - name: Cache 7-Zip build artifacts
        uses: actions/cache@v4
        with:
          # 缓存编译后的中间文件和产物
          path: |
            ${{ github.workspace }}\7z*\**\*.obj
            ${{ github.workspace }}\7z*\**\*.lib
            ${{ github.workspace }}\7z*\**\*.dll
            ${{ github.workspace }}\7z*\**\*.exe
            ${{ github.workspace }}\Temp
          # 按版本号缓存，版本不变则复用缓存
          key: ${{ runner.os }}-7zip-build-${{ hashFiles('7zVer.txt') }}
          # 回退：复用同系统的最新缓存
          restore-keys: |
            ${{ runner.os }}-7zip-build-

      - name: Get latest version
        shell: pwsh
        run: |
          $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html'
          $7zVerMatchInfo = Select-String -InputObject $7zHtml.Content -Pattern 'Download 7-Zip ([\d.]+) \(\d{4}-\d{2}-\d{2}\)'
          $7zVer = $7zVerMatchInfo.Matches.Groups[1].Value.Replace('.', '')
          $buildVersion = "7z$7zVer"
          Set-Content -Path 7zVer.txt -Value $buildVersion
          Write-Output "The latest version of 7-Zip is $buildVersion."
          echo "BUILD_VERSION=$buildVersion" >> $env:GITHUB_ENV

      - name: Prepare
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Prepare.ps1

      - name: Build
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Build.ps1

      - name: Pack
        shell: pwsh
        run: Get-Content -Path 7zVer.txt | .\Pack.ps1

      # ========== 优化2：精简清理逻辑，减少无意义耗时 ==========
      - name: Clean up old release/tag
        shell: pwsh
        run: |
          $tagName = "${{ env.BUILD_VERSION }}"
          # 仅检查标签是否存在，不存在则直接跳过
          $tagExists = git ls-remote --tags origin "refs/tags/$tagName" 2>$null
          if ($tagExists) {
            Write-Host "⚠️ Clean up old release/tag: $tagName"
            gh release delete $tagName --yes 2>$null
            git tag -d $tagName 2>$null
            git push origin :refs/tags/$tagName 2>$null
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== 核心优化3：升级Action版本，消除弃用警告 ==========
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v2  # 升级到v2，消除set-output警告
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.BUILD_VERSION }}
          release_name: 7-Zip ${{ env.BUILD_VERSION }} (Custom Icon)
          draft: false
          prerelease: false

      - name: Upload Installer to Release
        uses: actions/upload-release-asset@v2  # 升级到v2，消除set-output警告
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.BUILD_VERSION }}.exe
          asset_name: 7z-${{ env.BUILD_VERSION }}-Custom-Icon.exe
          asset_content_type: application/x-msdownload
