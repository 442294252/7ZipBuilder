name: Build
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      # 修复版：精准解析最新版本号，避免URL拼接错误
      - name: Get latest 7-Zip version (fixed parser)
        shell: pwsh
        run: |
          try {
              # 1. 下载7-Zip官网页面
              $7zHtml = Invoke-WebRequest -Uri 'https://www.7-zip.org/download.html' -UseBasicParsing
              
              # 2. 精准匹配最新版本号（修复正则，避免多余字符）
              # 匹配格式：Download 7-Zip 24.09 (x64) → 提取24.09 → 转为2409 → 拼接7z2409
              $versionMatch = [regex]::Match($7zHtml.Content, 'Download 7-Zip ([\d\.]+) \(x64\)')
              
              if ($versionMatch.Success) {
                  $rawVersion = $versionMatch.Groups[1].Value  # 如 24.09
                  $cleanVersion = $rawVersion.Replace('.', '') # 如 2409
                  $buildVersion = "7z$cleanVersion"            # 如 7z2409
                  
                  # 3. 验证源码URL是否存在（关键：提前校验，避免404）
                  $sourceUrl = "https://www.7-zip.org/a/$buildVersion-src.7z"
                  $urlTest = Invoke-WebRequest -Uri $sourceUrl -Method Head -UseBasicParsing -ErrorAction Stop
                  
                  # 4. 写入版本文件
                  Set-Content -Path 7zVer.txt -Value $buildVersion
                  Write-Output "✅ 成功获取最新版本：$buildVersion (原始版本：$rawVersion)"
                  Write-Output "✅ 源码URL验证通过：$sourceUrl"
              }
              else {
                  Write-Error "❌ 解析7-Zip版本号失败，使用备用稳定版7z2409"
                  $buildVersion = "7z2409"
                  Set-Content -Path 7zVer.txt -Value $buildVersion
              }
          }
          catch {
              Write-Error "❌ 获取最新版本失败：$($_.Exception.Message)，使用备用稳定版7z2409"
              $buildVersion = "7z2409"
              Set-Content -Path 7zVer.txt -Value $buildVersion
          }

      # 适配原生脚本：纯位置参数传递，无解析歧义
      - name: Prepare (native script compatible)
        shell: pwsh
        run: |
          $buildVersion = (Get-Content -Path 7zVer.txt -Raw).Trim()
          .\Prepare.ps1 $buildVersion

      - name: Build (native script compatible)
        shell: pwsh
        run: |
          $buildVersion = (Get-Content -Path 7zVer.txt -Raw).Trim()
          .\Build.ps1 $buildVersion

      - name: Pack (native script compatible)
        shell: pwsh
        run: |
          $buildVersion = (Get-Content -Path 7zVer.txt -Raw).Trim()
          .\Package.ps1 $buildVersion

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 7-Zip Installer (Latest Version)
          path: ./*.exe
          if-no-files-found: error
